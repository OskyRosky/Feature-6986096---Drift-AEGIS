# AEGIS Forecast Drift — read-only static CSV server (E7A)
# Serves the four governed CSVs to the internal aegis-net only.
server {
    listen 80;
    server_name _;
    server_tokens off;          # do not leak nginx version
    autoindex off;              # no directory listing
    charset utf-8;

    root /usr/share/nginx/html; # bound read-only to V1/data/processed/current

    # We serve only CSVs here; stock nginx mime.types has no .csv mapping.
    default_type text/csv;
    charset_types text/csv;

    # Read-only surface: reject anything that is not a safe read.
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Only expose the four governed CSVs; everything else is 404.
    location = /forecast_drift_signals.csv        { try_files $uri =404; }
    location = /forecast_drift_family_scores.csv  { try_files $uri =404; }
    location = /forecast_drift_event_history.csv  { try_files $uri =404; }
    location = /forecast_drift_runs.csv           { try_files $uri =404; }

    # Lightweight health path.
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        return 404;
    }
}
